server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: escala-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:escala_core}
    username: ${DB_USER:escala_api_user}
    password: ${DB_PASS:escala_api_password}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
logging:
  level:
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus

app:
  openapi:
    enabled: ${OPENAPI_ENABLED:true}
    include-admin: ${OPENAPI_INCLUDE_ADMIN:true}

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: ${JWT_EXPIRATION_MS:86400000}
      refresh-token:
        expiration: ${JWT_REFRESH_EXPIRATION_MS:604800000}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
    recaptcha:
      secret: ${RECAPTCHA_SECRET:}
    stripe:
      secret-key: ${STRIPE_SECRET_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
      price-essential: ${STRIPE_PRICE_ESSENTIAL:}
      price-professional: ${STRIPE_PRICE_PROFESSIONAL:}
      price-critical: ${STRIPE_PRICE_CRITICAL:}
  integrations:
    strapi:
      base-url: ${STRAPI_BASE_URL:http://localhost:1337}

---
spring:
  config:
    activate:
      on-profile: development

---
spring:
  config:
    activate:
      on-profile: homolog
  jpa:
    hibernate:
      ddl-auto: validate

---
spring:
  config:
    activate:
      on-profile: production
  jpa:
    hibernate:
      ddl-auto: validate
app:
  openapi:
    enabled: false
    include-admin: false

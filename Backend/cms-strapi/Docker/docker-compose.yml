services:
  strapi:
    container_name: cms-strapi
    build:
      context: ..
      dockerfile: ./Docker/Dockerfile
    image: cms-strapi:develop
    restart: unless-stopped
    ports:
      - "1337:1337"
    env_file:
      - ../.env
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: escala-postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: strapi_cms
      DATABASE_USERNAME: strapi_user
      DATABASE_PASSWORD: 3#Ubuntu2025*
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 1337
      ADMIN_PATH: /admin
      PUBLIC_URL: http://localhost:1337
    volumes:
      - ../public/uploads:/opt/app/public/uploads
    networks:
      escala-network:
networks:
  escala-network:
    external: true
